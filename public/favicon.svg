<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a8fff"/>
      <stop offset="100%" stop-color="#0055cc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Light mode styles -->
    <style>
      .bg { fill: #f0f4ff; }
      .border { stroke: #c8d8f8; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0d1117; }
        .border { stroke: #1e2a3a; }
      }
    </style>
  </defs>

  <!-- Background pill — adapts to mode -->
  <rect class="bg" width="32" height="32" rx="8"/>
  
  <!-- Subtle border -->
  <rect class="border" x="0.75" y="0.75" width="30.5" height="30.5" rx="7.5" fill="none" stroke-width="1"/>

  <!-- Terminal window dots (top bar) -->
  <circle cx="7" cy="8" r="1.5" fill="#ff5f57"/>
  <circle cx="11.5" cy="8" r="1.5" fill="#febc2e"/>
  <circle cx="16" cy="8" r="1.5" fill="#28c840"/>

  <!-- Divider line under bar -->
  <line x1="3" y1="12" x2="29" y2="12" stroke="url(#iconGrad)" stroke-width="0.75" opacity="0.4"/>

  <!-- > prompt arrow -->
  <path
    d="M6 18 L11 21.5 L6 25"
    stroke="url(#iconGrad)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />

  <!-- Cursor block _ -->
  <rect x="14" y="23" width="7" height="2.2" rx="0.6" fill="url(#iconGrad)" filter="url(#glow)" opacity="0.95"/>
</svg>
